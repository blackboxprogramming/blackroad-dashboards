<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad OS - Dashboard Templates</title>
    <script>
        // Inline AnsiUp - minimal implementation for ANSI to HTML conversion
        class AnsiUp {
            constructor() {
                this.ansi_colors = [
                    [  {color: "#000"}, {color: "#A00"}, {color: "#0A0"}, {color: "#A50"}, {color: "#00A"}, {color: "#A0A"}, {color: "#0AA"}, {color: "#AAA"}],
                    [  {color: "#555"}, {color: "#F55"}, {color: "#5F5"}, {color: "#FF5"}, {color: "#55F"}, {color: "#F5F"}, {color: "#5FF"}, {color: "#FFF"}]
                ];
            }
            ansi_to_html(txt) {
                return txt
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\x1b\[(\d+)m/g, (match, code) => {
                        if (code == 0) return '</span>';
                        if (code >= 30 && code <= 37) return `<span style="color: ${this.ansi_colors[0][code-30].color}">`;
                        if (code >= 90 && code <= 97) return `<span style="color: ${this.ansi_colors[1][code-90].color}">`;
                        return '';
                    })
                    .replace(/\x1b\[38;5;(\d+)m/g, '<span style="color: #AAA">')
                    .replace(/\x1b\[38;2;(\d+);(\d+);(\d+)m/g, (match, r, g, b) => `<span style="color: rgb(${r},${g},${b})">`)
                    .replace(/\x1b\[[^m]*m/g, '');
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0a12;
            --bg-surface: #121220;
            --bg-elevated: #1a1a2e;
            --bg-card: #222238;
            --orange: #f7931a;
            --pink: #e91e8c;
            --purple: #9945ff;
            --blue: #14f195;
            --cyan: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.3);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Fonts: JetBrains Mono for monospace, Press Start 2P for pixel headers */
        /* Fallback to system monospace fonts if CDN unavailable */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Press+Start+2P&display=swap');

        body {
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: #0a0a0a;
            border: 2px solid #ffffff;
            border-radius: 12px;
        }

        .header h1 {
            font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .header p {
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(153, 69, 255, 0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.5rem 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.7;
        }

        .filter-btn:hover {
            background: #1a1a1a;
            color: #ffffff;
            opacity: 1;
        }

        .filter-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            opacity: 1;
            font-weight: 600;
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .number {
            font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-card .label {
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
            font-size: 0.9rem;
            margin-top: 0.25rem;
            opacity: 0.7;
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #ffffff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #ffffff;
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-preview {
            width: 100%;
            height: 180px;
            background: #000;
            border-bottom: 1px solid #333;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.65rem;
            line-height: 1.2;
            overflow: hidden;
            position: relative;
            font-weight: 400;
        }

        .card-preview::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, #000, transparent);
            pointer-events: none;
        }

        .card-preview pre {
            margin: 0;
            white-space: pre;
            font-family: inherit;
            color: #fff;
        }

        .card-preview.no-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: inherit;
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .card-icon {
            font-size: 2rem;
        }

        .card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            flex: 1;
        }

        .card-description {
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            min-height: 2.7rem;
            opacity: 0.8;
            font-weight: 400;
        }

        .card-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .badge.category {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .badge.interactive {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        .badge.sound {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        .badge.api {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.35);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 18, 0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0a;
            border: 2px solid #ffffff;
            border-radius: 16px;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .modal-close:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .modal-description {
            font-family: 'JetBrains Mono', monospace;
            color: #ffffff;
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.9;
            font-weight: 400;
        }

        .preview-container {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.3;
            color: #fff;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
            font-weight: 400;
        }

        .preview-container pre {
            margin: 0;
            white-space: pre;
            font-family: inherit;
        }
        
        #previewContent {
            white-space: pre;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: 1px solid #ffffff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #1a1a1a;
            border-color: #ffffff;
        }

        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: #ffffff;
            opacity: 0.7;
        }

        .no-results h3 {
            font-family: 'Press Start 2P', 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👻 BLACKROAD OS Dashboards</h1>
        <p>Browse 142 beautiful terminal dashboards • Click to preview</p>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search templates...">
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="core">Core</button>
            <button class="filter-btn" data-category="monitoring">Monitoring</button>
            <button class="filter-btn" data-category="ai">AI</button>
            <button class="filter-btn" data-category="crypto">Crypto</button>
            <button class="filter-btn" data-category="infrastructure">Infrastructure</button>
            <button class="filter-btn" data-category="visualization">Visualization</button>
            <button class="filter-btn" data-category="security">Security</button>
            <button class="filter-btn" data-category="scifi">Sci-Fi</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalCount">115</div>
            <div class="label">Total Templates</div>
        </div>
        <div class="stat-card">
            <div class="number" id="filteredCount">115</div>
            <div class="label">Showing</div>
        </div>
        <div class="stat-card">
            <div class="number" id="interactiveCount">0</div>
            <div class="label">Interactive</div>
        </div>
    </div>

    <div class="grid" id="templatesGrid"></div>

    <div class="no-results" id="noResults" style="display: none;">
        <h3>No templates found</h3>
        <p>Try adjusting your search or filters</p>
    </div>

    <div class="modal" id="previewModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-description" id="modalDescription"></div>
            </div>
            <div class="preview-container" id="previewContainer">
                <pre id="previewContent">Loading preview...</pre>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn btn-primary" onclick="launchDashboard()">🚀 Launch Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        let templates = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let selectedTemplate = null;
        const ansi_up = new AnsiUp();

        // Category icons
        const categoryIcons = {
            core: '👻',
            monitoring: '📊',
            ai: '🤖',
            crypto: '₿',
            infrastructure: '🔧',
            visualization: '📈',
            security: '🔒',
            scifi: '🚀',
            general: '⚡'
        };

        // Load templates data
        fetch('templates.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load templates');
                }
                return response.json();
            })
            .then(data => {
                templates = data;
                renderTemplates();
                updateStats();
            })
            .catch(error => {
                console.error('Error loading templates:', error);
                document.getElementById('templatesGrid').innerHTML = 
                    '<div style="text-align: center; color: var(--pink); padding: 2rem;">' +
                    '⚠️ Failed to load templates. Please ensure templates.json is available.</div>';
            });

        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            const filtered = templates.filter(template => {
                const matchesCategory = currentFilter === 'all' || template.category === currentFilter;
                const matchesSearch = currentSearch === '' || 
                    template.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    template.description.toLowerCase().includes(currentSearch.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                noResults.style.display = 'none';
            }

            filtered.forEach(template => {
                const card = createTemplateCard(template);
                grid.appendChild(card);
            });

            document.getElementById('filteredCount').textContent = filtered.length;
        }

        function createTemplateCard(template) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => showPreview(template);

            const icon = categoryIcons[template.category] || '⚡';
            
            let badges = `<span class="badge category">${template.category}</span>`;
            if (template.interactive) badges += '<span class="badge interactive">Interactive</span>';
            if (template.has_sound) badges += '<span class="badge sound">🔊 Sound</span>';
            if (template.has_api) badges += '<span class="badge api">API</span>';

            // Create preview container
            const previewDiv = document.createElement('div');
            previewDiv.className = 'card-preview';
            previewDiv.id = `preview-${template.file}`;
            
            // Load visual preview asynchronously
            const screenshotFile = `screenshots/${template.name}.txt`;
            fetch(screenshotFile)
                .then(response => {
                    if (!response.ok) throw new Error('No preview');
                    return response.text();
                })
                .then(previewText => {
                    // Show first 15 lines of the preview
                    const lines = previewText.split('\n').slice(0, 15).join('\n');
                    const pre = document.createElement('pre');
                    pre.innerHTML = ansi_up.ansi_to_html(lines);
                    previewDiv.innerHTML = '';
                    previewDiv.appendChild(pre);
                })
                .catch(() => {
                    // Show icon as fallback
                    previewDiv.classList.add('no-preview');
                    previewDiv.textContent = icon;
                });

            card.appendChild(previewDiv);

            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'card-body';
            bodyDiv.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${icon}</div>
                    <div class="card-title">${template.name}</div>
                </div>
                <div class="card-description">${template.description || 'No description available'}</div>
                <div class="card-meta">
                    ${badges}
                </div>
            `;
            
            card.appendChild(bodyDiv);

            return card;
        }

        function showPreview(template) {
            selectedTemplate = template;
            const modal = document.getElementById('previewModal');
            const title = document.getElementById('modalTitle');
            const description = document.getElementById('modalDescription');
            const content = document.getElementById('previewContent');

            title.textContent = template.name;
            description.textContent = template.description || 'No description available';

            // Try to load visual preview first
            const screenshotFile = `screenshots/${template.name}.txt`;
            fetch(screenshotFile)
                .then(response => {
                    if (response.ok) {
                        return response.text();
                    }
                    throw new Error('No screenshot available');
                })
                .then(previewText => {
                    // Use ansi_up to convert ANSI codes to HTML
                    content.innerHTML = ansi_up.ansi_to_html(previewText);
                })
                .catch(() => {
                    // Fall back to script source
                    fetch(`../${template.file}`)
                        .then(response => response.text())
                        .then(scriptContent => {
                            const lines = scriptContent.split('\n').slice(0, 50);
                            content.textContent = lines.join('\n') + '\n\n... (truncated)';
                        })
                        .catch(error => {
                            content.textContent = 'Preview not available';
                        });
                });

            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('active');
            selectedTemplate = null;
        }

        function launchDashboard() {
            if (selectedTemplate) {
                // Copy to clipboard
                const command = `./${selectedTemplate.name}.sh`;
                navigator.clipboard.writeText(command).then(() => {
                    // Show success message
                    const btn = document.querySelector('.btn-primary');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✓ Command copied!';
                    btn.style.background = 'linear-gradient(135deg, #14f195, #00d4ff)';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = 'linear-gradient(135deg, var(--purple), var(--pink))';
                    }, 2000);
                }).catch(() => {
                    // Fallback to alert if clipboard not available
                    alert(`To launch this dashboard, run:\n\n./${selectedTemplate.name}.sh`);
                });
            }
        }

        function updateStats() {
            const interactiveCount = templates.filter(t => t.interactive).length;
            document.getElementById('totalCount').textContent = templates.length;
            document.getElementById('interactiveCount').textContent = interactiveCount;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderTemplates();
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderTemplates();
            });
        });

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on background click
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
